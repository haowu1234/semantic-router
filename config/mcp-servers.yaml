# MCP (Model Context Protocol) Servers Configuration
# 官方协议版本: 2025-06-18
# 
# 此文件配置 Dashboard 连接的 MCP 服务器
# 支持两种官方传输协议:
#   - stdio: 本地命令行工具 (filesystem, git, shell 等)
#   - streamable-http: 远程 HTTP 服务 (支持 OAuth 2.1)

version: "1.0"
protocol_version: "2025-06-18"

servers: []

